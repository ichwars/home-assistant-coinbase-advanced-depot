api_call:
  name: Coinbase API call
  description: Call a read-only Coinbase REST endpoint with GET and return the response.
  fields:
    entry_id:
      name: Config entry ID
      description: Required when more than one Coinbase Advanced entry is configured.
      example: "01HXYZ..."
      selector:
        text:
    path:
      name: API path
      description: Relative Coinbase API path, for example /api/v3/brokerage/accounts or /v2/exchange-rates.
      required: true
      example: "/api/v3/brokerage/accounts"
      selector:
        text:
    params:
      name: Query parameters
      description: Optional query parameters for GET requests.
      example:
        limit: 10
      selector:
        object:

refresh:
  name: Refresh Coinbase data
  description: Force a data refresh for a Coinbase Advanced config entry.
  fields:
    entry_id:
      name: Config entry ID
      description: Required when more than one Coinbase Advanced entry is configured.
      selector:
        text:
